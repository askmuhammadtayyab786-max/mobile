

services:
  # ─── MongoDB ────────────────────────────────
  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - app_network

  # ─── Backend ────────────────────────────────
  backend:
    image: backend
    container_name: backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/fileforge
      - MAX_FILE_SIZE=52428800
      - UPLOAD_DIR=./uploads
      - ALLOWED_ORIGINS=http://16.176.232.43
    expose:
      - "5000"
    depends_on:
      - mongo
    networks:
      - app_network

  # ─── Frontend ───────────────────────────────
  frontend:
    image: frontend
    container_name: frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=/api
      - NODE_ENV=production
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - app_network

  # ─── Nginx ──────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - app_network

volumes:
  mongo_data:

networks:
  app_network:
    driver: bridge
